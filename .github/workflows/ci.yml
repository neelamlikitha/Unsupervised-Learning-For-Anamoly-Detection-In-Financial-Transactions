name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    name: Backend lint & check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Check syntax (node --check)
        run: |
          find src -name '*.js' | xargs -I {} node --check {}

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  health-check-smoke:
    name: Health check smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - run: echo "Health check smoke test placeholder – backend requires DB to run. Configure DB service in CI for full e2e."
